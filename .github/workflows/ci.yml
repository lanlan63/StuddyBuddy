name: StudyBuddy CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  node-checks:
    name: Node.js checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build web image
        run: docker build -t studybuddy-web .
